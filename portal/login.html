<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#07162D">
    <title>UroWorkNet · Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy-deep: #04102A;
            --accent: #64B5F6;
            --green: #34c759;
            --text-primary: #ffffff;
            --text-secondary: rgba(232, 244, 253, 0.78);
            --text-muted: rgba(200, 223, 245, 0.55);
        }
        html, body {
            min-height: 100%;
            background: var(--navy-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .bg-base {
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 15% -10%, rgba(0, 113, 227, 0.45), transparent 55%),
                radial-gradient(ellipse at 85% 110%, rgba(52, 199, 89, 0.30), transparent 55%),
                linear-gradient(180deg, #07162D 0%, #04102A 60%, #020817 100%);
            z-index: -1;
        }
        .card {
            background: linear-gradient(155deg, rgba(13, 31, 60, 0.85), rgba(7, 22, 45, 0.85));
            border: 1px solid rgba(100, 181, 246, 0.25);
            border-radius: 28px;
            padding: 40px 36px 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 60px rgba(0, 113, 227, 0.18);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .logo {
            width: 64px; height: 64px;
            background: linear-gradient(145deg, rgba(0, 113, 227, 0.25), rgba(52, 199, 89, 0.20));
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .logo svg { width: 36px; height: 36px; }
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 12px;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 16px;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }
        button[type="submit"] {
            width: 100%;
            border: none;
            background: linear-gradient(135deg, #0071E3, #0058B3);
            color: #fff;
            border-radius: 12px;
            padding: 13px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 24px rgba(0, 113, 227, 0.35);
        }
        button[type="submit"]:hover { transform: translateY(-1px); }
        button[type="submit"]:active { transform: scale(0.98); }
        button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
        .error {
            color: #FF6B6B;
            background: rgba(255, 107, 107, 0.10);
            border: 1px solid rgba(255, 107, 107, 0.30);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 13px;
            margin-top: 14px;
            display: none;
        }
        .error.show { display: block; }
        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
        }
        .back:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-base"></div>
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 64 64" fill="none">
                <defs>
                    <linearGradient id="kgrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#64B5F6"/>
                        <stop offset="100%" stop-color="#34c759"/>
                    </linearGradient>
                </defs>
                <path d="M22 12 C 14 12, 9 22, 11 33 C 13 44, 19 53, 26 51 C 30 50, 30 46, 27 41 C 24 36, 24 28, 27 22 C 29 17, 27 12, 22 12 Z" stroke="url(#kgrad)" stroke-width="3" stroke-linejoin="round" fill="none"/>
                <path d="M42 12 C 50 12, 55 22, 53 33 C 51 44, 45 53, 38 51 C 34 50, 34 46, 37 41 C 40 36, 40 28, 37 22 C 35 17, 37 12, 42 12 Z" stroke="url(#kgrad)" stroke-width="3" stroke-linejoin="round" fill="none"/>
                <circle cx="32" cy="32" r="2.5" fill="url(#kgrad)"/>
            </svg>
        </div>
        <h1 class="title">UroWorkNet</h1>
        <p class="subtitle">Inicia sesión para acceder a tus apps</p>

        <form id="loginForm" autocomplete="on">
            <label for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" required autocomplete="username">

            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">

            <button type="submit" id="submitBtn">Entrar</button>

            <div class="error" id="errorMsg"></div>
        </form>

        <a href="/portal/" class="back">← Volver al inicio</a>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');

        let supabase = null;

        async function initSupabase() {
            const res = await fetch('/api/config');
            if (!res.ok) throw new Error('No se pudo cargar configuración');
            const cfg = await res.json();
            supabase = createClient(cfg.supabase_url, cfg.supabase_anon_key);
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }
        function clearError() {
            errorMsg.classList.remove('show');
        }

        // Solo acepta rutas internas absolutas ("/algo"). Rechaza URLs
        // externas ("https://...", "//evil.com") y esquemas peligrosos
        // ("javascript:") para evitar open redirect / XSS vía el parámetro next.
        function safeNext() {
            const raw = new URLSearchParams(location.search).get('next') || '/portal/';
            // Debe empezar por una sola barra, no por "//" (protocol-relative)
            // y no contener "\" (algunos navegadores lo normalizan a "/", lo
            // que convertiría "/\evil.com" en "//evil.com").
            if (/^\/(?!\/)/.test(raw) && !raw.includes('\\')) return raw;
            return '/portal/';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Entrando…';

            try {
                if (!supabase) await initSupabase();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                // Sesión guardada por Supabase JS en localStorage automáticamente.
                location.href = safeNext();
            } catch (e) {
                showError(e.message || 'Credenciales inválidas');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar';
            }
        });

        // Si ya está logueado, redirigir.
        (async () => {
            try {
                await initSupabase();
                const { data } = await supabase.auth.getSession();
                if (data?.session) {
                    location.href = safeNext();
                }
            } catch {}
        })();
    </script>
</body>
</html>
